version: '3.7'

services:
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command: >
      --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus

  grafana:
    platform: linux/amd64

    depends_on:
      prometheus:
        condition: service_started

    build:
      args:
        grafana_version: ${GRAFANA_VERSION:-11.5.1}
    volumes:
      - ./dist:/var/lib/grafana/plugins/azure-prometheus-datasource
      - .:/root/azure-prometheus-datasource
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
