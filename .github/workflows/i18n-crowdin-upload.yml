name: Crowdin Upload Action

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/locales/en-US/grafana-azureprometheus-datasource.json'
    branches:
      - main

jobs:
  upload-sources-to-crowdin:
    runs-on: ubuntu-x64
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: 'Get vault secrets'
        id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@849fabda9b23ba8862563b4a15b979954d80e928 # main
        with:
            # Vault secret paths:
            # - ci/repo/grafana/azure-prometheus-datasource/grafana-frontend-crowdin-token
            repo_secrets: |
                CROWDIN_TOKEN=grafana-frontend-crowdin-token:access_token
      - name: Upload to Crowdin
        uses: grafana/grafana-github-actions/crowdin-upload@3c62d35c5a66e730186a338e45aeb8fa784e2d56 # main
        with:
          crowdin_token: ${{ env.CROWDIN_TOKEN }}
          crowdin_project_id: 30
